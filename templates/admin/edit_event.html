{% extends "base.html" %}
{% block title %}Edit Event — EventHub{% endblock %}
{% block content %}
<div class="container">
    <div class="form-container" style="max-width:560px;">
        <a href="{{ url_for('admin.dashboard') }}" style="color:var(--clr-text-muted);font-size:0.9rem;">← Back to Dashboard</a>
        <div class="form-card" style="margin-top:1rem;">
            <h2>✏️ Edit Event</h2>
            <p class="subtitle">Update the event details</p>
            <form method="POST" action="{{ url_for('admin.edit_event', event_id=event.Event_ID) }}">
                <div class="form-group">
                    <label for="name">Event Name *</label>
                    <input type="text" id="name" name="name" value="{{ event.Name }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description">{{ event.Description }}</textarea>
                </div>
                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" name="date" value="{{ event.Date }}" required>
                </div>
                <div class="form-group">
                    <label for="venue">Venue *</label>
                    <input type="text" id="venue" name="venue" value="{{ event.Venue }}" required>
                </div>
                <div class="form-group">
                    <label for="max_seats">Maximum Seats</label>
                    <input type="number" id="max_seats" name="max_seats" value="{{ event.Max_Seats }}" min="1">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Event</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
